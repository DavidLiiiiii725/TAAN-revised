# Base training configuration for TAAN-GRPO
# Override specific keys in task-specific configs.

# ── Model ──────────────────────────────────────────────────────────────────────
model_name: "Qwen/Qwen3-4B"
dtype: "bfloat16"

# ── Sampling (rollout) ─────────────────────────────────────────────────────────
G: 8                       # number of responses sampled per prompt
temperature: 1.0
top_p: 0.95
max_gen_tokens: 2048

# ── Training ───────────────────────────────────────────────────────────────────
batch_size: 128            # prompts per training step
lr: 1.0e-6
weight_decay: 0.01
max_steps: 5000
warmup_steps: 100
gradient_accumulation_steps: 4
max_grad_norm: 1.0
seed: 42

# ── GRPO ───────────────────────────────────────────────────────────────────────
clip_eps: 0.2              # PPO clip range ε
beta: 0.01                 # KL penalty coefficient

# ── TAAN ───────────────────────────────────────────────────────────────────────
taan_alpha: 0.99           # EMA decay coefficient α
taan_clip: 5.0             # advantage clip threshold c
taan_min_samples: 20       # minimum samples for robust statistics
taan_eps: 1.0e-8           # division epsilon

# ── Distributed ────────────────────────────────────────────────────────────────
tp_size: 1                 # tensor parallel size (vLLM)
dp_size: 1                 # data parallel size

# ── Checkpointing ──────────────────────────────────────────────────────────────
output_dir: "outputs/taan-grpo"
log_every: 10
save_every: 500
eval_every: 200
resume_from: null          # path to checkpoint directory to resume from

# ── Logging ────────────────────────────────────────────────────────────────────
wandb_project: "taan-grpo"
wandb_run_name: null       # auto-generated if null
